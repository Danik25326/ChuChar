version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: chuchar
      POSTGRES_PASSWORD: chuchar123
      POSTGRES_DB: chuchar
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - JWT_SECRET=your_jwt_secret_key
      - OPENAI_API_KEY=your_openai_api_key
      - DATABASE_URL=postgresql://chuchar:chuchar123@postgres:5432/chuchar
    depends_on:
      - postgres
    volumes:
      - ./backend:/app
      - /app/node_modules

volumes:
  postgres_data:
